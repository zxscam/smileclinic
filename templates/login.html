{% extends "base.html" %}

{% block title %}Вход — SmileClinic{% endblock %}

{% block content %}

<style>
    .login-box {
        max-width: 400px;
        margin: 50px auto;
        background: var(--bg-card, #fff);
        border: 1px solid var(--border, #e2e8f0);
        border-radius: 16px;
        padding: 36px;
    }
    .login-title { color: var(--text, #0b132b); }
    .login-subtitle { color: var(--text-muted, #94a3b8); }
    .login-label { color: var(--text, #0b132b); }
    .login-input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border, #e2e8f0);
        border-radius: 8px;
        font-size: 15px;
        margin-top: 4px;
        background: var(--bg-input, #f8fafc);
        color: var(--text, #0b132b);
    }
    .login-input:focus { outline: none; border-color: var(--accent, #2563eb); }
    .login-btn {
        width: 100%;
        padding: 12px;
        background: var(--accent, #2563eb);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
    }
    .login-link { color: var(--text-muted, #94a3b8); }
    .login-link a { color: var(--accent, #2563eb); font-weight: 600; text-decoration: none; }
</style>

<div class="login-box">
    <div style="text-align: center; margin-bottom: 28px;">
        <div style="font-size: 40px; margin-bottom: 8px;">🦷</div>
        <h2 class="login-title" style="margin:0; font-size:22px;">Вход</h2>
        <p class="login-subtitle" style="font-size:14px; margin:4px 0 0;">Войдите в личный кабинет</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div style="margin-bottom: 14px;">
            <label class="login-label" style="font-size:13px; font-weight:600;">Логин</label>
            <input type="text" name="username" class="login-input" placeholder="Введите логин" required>
        </div>
        <div style="margin-bottom: 20px;">
            <label class="login-label" style="font-size:13px; font-weight:600;">Пароль</label>
            <input type="password" name="password" class="login-input" placeholder="Введите пароль" required>
        </div>
        <button type="submit" class="login-btn">Войти</button>
    </form>
    
    <p class="login-link" style="text-align:center; margin-top:18px; font-size:14px;">
        Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a>
    </p>
</div>

{% endblock %}
